name: studymate_flutter
description: "StudyMate — AI Powered Smart Student Companion"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local database — no internet/backend needed
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Reminder popup notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Dates
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
